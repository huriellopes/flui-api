name: Deploy to Contabo

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.env.example'
  workflow_dispatch:

concurrency:
  group: deploy-contabo
  cancel-in-progress: false

jobs:
  # Portão de qualidade: só deploya se lint + typecheck + testes passarem.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx prisma generate
      - run: npm run lint:check
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.CONTABO_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.CONTABO_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Envia arquivos (rsync)
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude '.github' --exclude 'node_modules' \
            --exclude 'dist' --exclude '.env' --exclude 'coverage' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            ./ "${{ secrets.CONTABO_USER }}@${{ secrets.CONTABO_HOST }}:${{ secrets.CONTABO_PATH }}/"

      - name: Build & up no servidor
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            "${{ secrets.CONTABO_USER }}@${{ secrets.CONTABO_HOST }}" \
            "cd '${{ secrets.CONTABO_PATH }}' && \
             docker compose up -d --build && \
             docker network connect flui-net proxy 2>/dev/null || true && \
             docker image prune -f"

      - name: Verifica health
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            "${{ secrets.CONTABO_USER }}@${{ secrets.CONTABO_HOST }}" \
            "sleep 8 && docker exec flui-api wget -qO- http://localhost:3000/api/health"

  # Gera uma GitHub Release a cada deploy bem-sucedido.
  release:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cria release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}-build.${{ github.run_number }}"
          gh release create "$TAG" \
            --title "API v${VERSION} (build ${{ github.run_number }})" \
            --target "${{ github.sha }}" \
            --generate-notes
