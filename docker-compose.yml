# Stack de produção para o Contabo.
# A API NÃO expõe porta pública — é publicada pelo Nginx Proxy Manager já existente,
# conectando o 'proxy' à rede 'notifywater-net'.
services:
  notifywater-db:
    image: postgres:16-alpine
    container_name: notifywater-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - notifywater-db-data:/var/lib/postgresql/data
    networks:
      - notifywater-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  notifywater-api:
    build: .
    container_name: notifywater-api
    restart: unless-stopped
    depends_on:
      notifywater-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: ${PORT}
      DOCS_USER: ${DOCS_USER}
      DOCS_PASSWORD: ${DOCS_PASSWORD}
      DOCS_PUBLIC: ${DOCS_PUBLIC}
    expose:
      - "3000"
    networks:
      - notifywater-net

volumes:
  notifywater-db-data:

networks:
  notifywater-net:
    name: notifywater-net
