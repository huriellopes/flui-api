# Stack de produção (Flui API) para o Contabo.
# A API NÃO expõe porta pública — é publicada pelo Nginx Proxy Manager já existente,
# conectando o container 'proxy' à rede 'flui-net'.
services:
  flui-db:
    image: postgres:16-alpine
    container_name: flui-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - flui-db-data:/var/lib/postgresql/data
    networks:
      - flui-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  flui-api:
    build: .
    container_name: flui-api
    restart: unless-stopped
    depends_on:
      flui-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: ${PORT}
      DOCS_USER: ${DOCS_USER}
      DOCS_PASSWORD: ${DOCS_PASSWORD}
      DOCS_PUBLIC: ${DOCS_PUBLIC}
      PUBLIC_URL: ${PUBLIC_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TELEGRAM_APP_NAME: ${TELEGRAM_APP_NAME}
      TELEGRAM_FORWARD_LOGS: ${TELEGRAM_FORWARD_LOGS}
      TELEGRAM_THREAD_ALERTS: ${TELEGRAM_THREAD_ALERTS}
      TELEGRAM_THREAD_SUPPORT: ${TELEGRAM_THREAD_SUPPORT}
      TELEGRAM_THREAD_DEBUG: ${TELEGRAM_THREAD_DEBUG}
    volumes:
      - flui-uploads:/app/uploads
    expose:
      - "3000"
    networks:
      - flui-net

# Volumes com nome fixo (independente do nome da pasta/projeto) para os dados
# persistirem através de renomeações do diretório do compose.
volumes:
  flui-db-data:
    name: flui-db-data
  flui-uploads:
    name: flui-uploads

networks:
  flui-net:
    name: flui-net
